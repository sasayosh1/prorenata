name: Daily Article Maintenance Check


on:
  # Disabled to avoid API costs and run failed emails. Content to be generated via Antigravity locally.
  # schedule:
  #   # 毎日 AM3:00 (JST) = 毎日 PM6:00 (UTC) に実行（月曜は記事生成の1時間後）
  #   - cron: '0 18 * * *'

  workflow_dispatch: # 手動実行も可能にする
    inputs:
      force_run:
        description: "Force run even if it ran within 24h"
        required: false
        default: false
        type: boolean


concurrency:
  group: repo-write-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false


jobs:
  safety-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_run: ${{ steps.safety.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0


      - name: Check last run timestamp (24h safety)
        id: safety
        env:
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_run || 'false' }}
        run: |
          echo "should_run=true" >> $GITHUB_OUTPUT
          
