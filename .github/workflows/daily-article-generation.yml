name: Daily Article Generation

on:
  schedule:
    # 毎日 AM2:00 (JST) = 毎日 PM5:00 (UTC前日)
    - cron: '0 17 * * *'
  workflow_dispatch: # 手動実行も可能にする

jobs:
  generate_article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run article generation script
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/run-daily-generation.cjs

      - name: Commit budget update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .budget/*.json
          if git diff --staged --quiet; then
            echo "No budget changes to commit"
          else
            git commit -m "chore: update ai budget usage $(date +'%Y-%m-%d')"
            git pull --rebase --autostash origin main
            git push
          fi
