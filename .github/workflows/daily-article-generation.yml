name: Daily Article Generation


on:
  # Disabled to avoid API costs and run failed emails. Content to be generated via Antigravity locally.
  # schedule:
  #   # 毎日 AM2:00 (JST) = 毎日 PM5:00 (UTC前日)
  #   - cron: '0 17 * * *'

  workflow_dispatch: # 手動実行も可能にする


jobs:
  generate_article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0


      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'


      - name: Install dependencies
        run: npm ci --include=dev


      - name: Run article generation script
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
