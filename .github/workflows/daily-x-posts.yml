name: Generate Daily X Posts

on:
  schedule:
    # 毎日日本時間 午前4:00 (UTC前日19:00) に実行
    - cron: '0 19 * * *'
  workflow_dispatch: # 手動実行用

jobs:
  generate-x-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Generation Script
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
        run: node scripts/generate-x-posts-daily.cjs
        
      - name: Commit and Push Changes
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add X投稿/
          git commit -m "chore: auto-generate daily X posts [skip ci]" || echo "No changes to commit"
          git push

      - name: Create issue if generation failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo' });
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[X投稿生成] 自動生成に失敗しました (${date})`,
              body: `## X投稿自動生成エラー\n\n定期的なX投稿生成プロセスが失敗しました。\n\n詳細はワークフローログを確認してください:\n${context.payload.repository.html_url}/actions/runs/${context.runId}\n\n---\n**実行時刻**: ${date}\n**スクリプト**: scripts/generate-x-posts-daily.cjs\n**考えられる原因**:\n- Gemini API エラー\n- Sanity API エラー\n- ノート(Note) RSS 取得エラー\n- 環境変数の不足`,
              labels: ['automation', 'x-posts', 'bug']
            });
