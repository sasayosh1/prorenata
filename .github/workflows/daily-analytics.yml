name: Daily Analytics & SEO Report


on:
  # Disabled to avoid API costs and run failed emails. Content to be generated via Antigravity locally.
  # schedule:
  #   # 毎日 09:00 JST = 00:00 UTC
  #   - cron: '0 0 * * *'

  workflow_dispatch:
    # 手動実行可能


concurrency:
  group: repo-write-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false


permissions:
  contents: write
  issues: write


jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest


    env:
      GA4_PROPERTY_ID: '504242963'
      GSC_SITE_URL: 'https://prorenata.jp/'


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
